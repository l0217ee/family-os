<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family OS</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#f4f6f8;
  font-family:Arial,"Noto Sans KR",sans-serif;
  color:#111827;
}
.app{
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  background:#fff;
  padding:22px 18px 80px;
}
h1{font-size:26px;margin:0 0 4px}
.sub{color:#6b7280;margin-bottom:22px}
.section{margin:24px 0}
.section h2{font-size:17px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
button{
  border:0;
  border-radius:14px;
  padding:14px 10px;
  background:#eef2ff;
  font-size:15px;
  font-weight:700;
}
button.active{
  background:#111827;
  color:#fff;
}
.task-group{margin-bottom:18px}
.task-group-title{
  font-size:14px;
  color:#6b7280;
  margin:0 0 8px;
}
.tasks{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.save{
  width:100%;
  background:#2563eb;
  color:#fff;
  font-size:17px;
  padding:16px;
  margin-top:10px;
}
.card{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}
.stat-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #e5e7eb;
}
.stat-row:last-child{border-bottom:0}
.toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  background:#111827;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  display:none;
}
</style>
</head>
<body>
<div class="app">
  <h1>Family OS</h1>
  <div class="sub">오늘의 기여를 기록해요</div>

  <div class="section">
    <h2>누가 했나요?</h2>
    <div id="members" class="grid"></div>
  </div>

  <div class="section">
    <h2>무엇을 했나요?</h2>
    <div id="tasks"></div>
  </div>

  <button class="save" onclick="saveLog()">기록하기</button>

  <div class="section">
    <h2>오늘의 기여도</h2>
    <div id="todayStats" class="card">불러오는 중...</div>
  </div>

  <div class="section">
    <h2>오늘 기록</h2>
    <div id="todayLogs" class="card">불러오는 중...</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbyCjC-B2l2R7isQOvNmvF9JC7Fseue0r9JlFTpUDc9basIhIt4FbQ4OdDdSj6aONuvqrg/exec";

let members = [];
let tasks = [];
let selectedMember = null;
let selectedTask = null;

async function init(){
  members = await fetch(API_URL + "?action=getMembers").then(r=>r.json());
  tasks = await fetch(API_URL + "?action=getTasks").then(r=>r.json());

  renderMembers();
  renderTasks();
  loadStats();
  loadTodayLogs();
}

function renderMembers(){
  const box = document.getElementById("members");
  box.innerHTML = "";

  members.forEach(m=>{
    const btn = document.createElement("button");
    btn.textContent = m.name;
    btn.onclick = () => {
      selectedMember = m.member_id;
      document.querySelectorAll("#members button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
    };
    box.appendChild(btn);
  });
}

function renderTasks(){
  const box = document.getElementById("tasks");
  box.innerHTML = "";

  const grouped = {};
  tasks.forEach(t=>{
    const category = t.category_name || "기타";
    if(!grouped[category]) grouped[category] = [];
    grouped[category].push(t);
  });

  Object.keys(grouped).forEach(category=>{
    const group = document.createElement("div");
    group.className = "task-group";

    const title = document.createElement("div");
    title.className = "task-group-title";
    title.textContent = category;

    const list = document.createElement("div");
    list.className = "tasks";

    grouped[category].forEach(t=>{
      const btn = document.createElement("button");
      btn.textContent = t.task_name;
      btn.onclick = () => {
        selectedTask = t.task_id;
        document.querySelectorAll("#tasks button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
      };
      list.appendChild(btn);
    });

    group.appendChild(title);
    group.appendChild(list);
    box.appendChild(group);
  });
}

async function saveLog(){
  if(!selectedMember){
    showToast("구성원을 선택해 주세요");
    return;
  }
  if(!selectedTask){
    showToast("할일을 선택해 주세요");
    return;
  }

  showToast("기록 중...");

  const res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"addLog",
      member_id:selectedMember,
      task_id:selectedTask
    })
  }).then(r=>r.json());

  if(res.ok){
    showToast("기록했어요!");
    loadStats();
    loadTodayLogs();
  }else{
    showToast("기록 실패");
  }
}

async function loadStats(){
  const stats = await fetch(API_URL + "?action=getStats").then(r=>r.json());
  const box = document.getElementById("todayStats");

  box.innerHTML = "";

  Object.values(stats.today).forEach(item=>{
    const row = document.createElement("div");
    row.className = "stat-row";
    row.innerHTML = `<span>${item.name}</span><strong>${item.score}점</strong>`;
    box.appendChild(row);
  });
}

async function loadTodayLogs(){
  const logs = await fetch(API_URL + "?action=getTodayLogs").then(r=>r.json());
  const box = document.getElementById("todayLogs");

  if(!logs.length){
    box.innerHTML = "아직 기록이 없어요.";
    return;
  }

  box.innerHTML = "";

  logs.forEach(log=>{
    const time = new Date(log.created_at).toLocaleTimeString("ko-KR", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const row = document.createElement("div");
    row.className = "stat-row";
    row.innerHTML = `<span>${time}</span><strong>${log.member_name} · ${log.task_name}</strong>`;
    box.appendChild(row);
  });
}

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(()=>toast.style.display="none", 1600);
}

init();
</script>
</body>
</html>
