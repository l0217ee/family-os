<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>집안일 함께하기</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f6f8;font-family:Arial,"Noto Sans KR",sans-serif;color:#111827}
.app{max-width:430px;min-height:100vh;margin:0 auto;background:#fff;padding:22px 18px 92px}
h1{font-size:26px;margin:0 0 4px}
.sub{color:#6b7280;margin-bottom:22px}
.section{margin:24px 0}
.section h2{font-size:17px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button{border:0;border-radius:14px;padding:13px 8px;background:#eef2ff;font-size:14px;font-weight:700}
button.active{background:#111827;color:#fff}
.task-group{margin-bottom:18px}
.task-group-title{font-size:14px;color:#6b7280;margin:0 0 8px}
.tasks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.save{width:100%;background:#2563eb;color:#fff;font-size:17px;padding:16px;margin-top:10px}
.card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:18px;padding:16px;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #e5e7eb}
.stat-row:last-child{border-bottom:0}
.stat-row small{color:#6b7280;font-weight:400}
.toast{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 18px;border-radius:999px;display:none;z-index:10}
.screen{display:none}
.screen.active{display:block}
.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-top:1px solid #e5e7eb;z-index:9}
.tab{border-radius:0;background:#fff;color:#6b7280;padding:12px 4px;font-size:13px}
.tab.active{background:#eff6ff;color:#2563eb}
.filter-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.filter-tabs button{font-size:12px;padding:9px 4px;border-radius:999px;background:#f3f4f6;color:#4b5563}
.filter-tabs button.active{background:#111827;color:#fff}
input,select{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:13px;font-size:15px;background:#fff}
.form{display:grid;gap:10px}
.form-row{display:grid;grid-template-columns:72px 1fr;align-items:center;gap:10px}
.form-row label{font-size:14px;color:#6b7280;font-weight:700}
.total-reward{font-size:18px;font-weight:800;color:#6b7280;white-space:nowrap}
.total-reward strong{color:#2563eb;font-size:22px}
.earn-text{color:#2563eb}
.spend-text{color:#dc2626}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700}
.wallet-row{display:grid;grid-template-columns:42px 52px 1fr 72px;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e7eb;font-size:13px}
.wallet-row:last-child{border-bottom:0}
.wallet-row .desc{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#374151}
.wallet-row .amount{text-align:right;font-weight:800}
.reward-summary-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 0;border-bottom:1px solid #e5e7eb}
.reward-summary-row:last-child{border-bottom:0}
.reward-summary-row small{grid-column:1 / -1}
</style>
</head>

<body>
<div class="app">
  <h1>집안일 함께하기</h1>
  <div id="screenSub" class="sub">오늘 한 일을 기록해요</div>

  <div id="recordScreen" class="screen active">
    <div class="section">
      <h2>누가 했나요?</h2>
      <div id="members" class="grid"></div>
    </div>

    <div class="section">
      <h2>무엇을 했나요?</h2>
      <div id="tasks"></div>
    </div>

    <button class="save" onclick="saveLog()">기록하기</button>

    <div class="section">
      <h2>오늘 기록</h2>
      <div id="todayLogFilters" class="filter-tabs"></div>
      <div id="todayLogs" class="card">불러오는 중...</div>
    </div>
  </div>

  <div id="walletScreen" class="screen">
    <div class="section">
      <h2>가족 전체 리워드</h2>
      <div class="card">
        <div class="total-reward" id="familyRewardTotal">
          우리 가족이 <strong>0원</strong>을 모았어요!
        </div>
      </div>
    </div>

    <div class="section">
      <h2>구성원별 리워드</h2>
      <div id="walletSummary" class="card">불러오는 중...</div>
    </div>

    <div class="section">
      <h2>리워드 사용하기</h2>
      <div class="card form">
        <div class="form-row">
          <label for="spendMember">지갑 주인</label>
          <select id="spendMember"></select>
        </div>

        <div class="form-row">
          <label for="spendAmount">쓴 돈</label>
          <input id="spendAmount" type="number" placeholder="예: 1000" />
        </div>

        <div class="form-row">
          <label for="spendDesc">산 물건</label>
          <input id="spendDesc" type="text" placeholder="예: 간식, 장난감" />
        </div>

        <button class="save" onclick="spendWallet()">사용 기록하기</button>
      </div>
    </div>

    <div class="section">
      <h2>월렛 기록</h2>
      <div id="walletHistoryFilters" class="filter-tabs"></div>
      <div id="walletHistory" class="card">불러오는 중...</div>
    </div>
  </div>

  <div id="statsScreen" class="screen">
    <div class="section">
      <h2>통계</h2>
      <div class="card">통계 기능은 다음 단계에서 연결할 예정이에요.</div>
    </div>
  </div>

  <div id="adminScreen" class="screen">
    <div class="section">
      <h2>관리</h2>
      <div class="card">집안일 추가/수정/삭제는 다음 단계에서 연결할 예정이에요.</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button id="recordTab" class="tab active" onclick="showScreen('record')">기록</button>
  <button id="walletTab" class="tab" onclick="showScreen('wallet')">월렛</button>
  <button id="statsTab" class="tab" onclick="showScreen('stats')">통계</button>
  <button id="adminTab" class="tab" onclick="showScreen('admin')">관리</button>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbyCjC-B2l2R7isQOvNmvF9JC7Fseue0r9JlFTpUDc9basIhIt4FbQ4OdDdSj6aONuvqrg/exec";

let members = [];
let tasks = [];
let todayLogs = [];
let walletSummary = [];
let walletHistory = [];

let selectedMember = null;
let selectedMemberRole = null;
let selectedTask = null;
let todayLogFilter = "ALL";
let walletHistoryFilter = "ALL";

async function init(){
  members = await fetch(API_URL + "?action=getMembers").then(r=>r.json());
  tasks = await fetch(API_URL + "?action=getTasks").then(r=>r.json());

  renderMembers();
  renderSpendMembers();
  renderMemberFilters("todayLogFilters", setTodayLogFilter);
  renderMemberFilters("walletHistoryFilters", setWalletHistoryFilter);
  renderTasks();
  await loadTodayLogs();
}

function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(name + "Screen").classList.add("active");
  document.getElementById(name + "Tab").classList.add("active");

  const subMap = {
    record: "오늘 한 일을 기록해요",
    wallet: "쌓은 리워드를 확인하고 사용해요",
    stats: "우리 가족의 기여도를 살펴봐요",
    admin: "집안일 항목을 관리해요"
  };
  document.getElementById("screenSub").textContent = subMap[name];

  if(name === "wallet"){
    loadWalletSummary();
    loadWalletHistory();
  }
}

function renderMembers(){
  const box = document.getElementById("members");
  box.innerHTML = "";

  members.forEach(m=>{
    const btn = document.createElement("button");
    btn.textContent = m.name;
    btn.onclick = () => {
      selectedMember = m.member_id;
      selectedMemberRole = m.role;
      selectedTask = null;

      document.querySelectorAll("#members button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");

      renderTasks();
    };
    box.appendChild(btn);
  });
}

function renderTasks(){
  const box = document.getElementById("tasks");
  box.innerHTML = "";

  if(!selectedMemberRole){
    box.innerHTML = `<div class="card">먼저 구성원을 선택해 주세요.</div>`;
    return;
  }

  const allowedScopes = selectedMemberRole === "parent"
    ? ["all", "adult"]
    : ["all", "child"];

  const filteredTasks = tasks.filter(t =>
    allowedScopes.includes(String(t.target_scope || "all").toLowerCase())
  );

  const grouped = {};
  filteredTasks.forEach(t=>{
    const category = t.category_name || "기타";
    if(!grouped[category]) grouped[category] = [];
    grouped[category].push(t);
  });

  Object.keys(grouped).forEach(category=>{
    const group = document.createElement("div");
    group.className = "task-group";

    const title = document.createElement("div");
    title.className = "task-group-title";
    title.textContent = category;

    const list = document.createElement("div");
    list.className = "tasks";

    grouped[category].forEach(t=>{
      const btn = document.createElement("button");
      btn.textContent = t.task_name;
      btn.onclick = () => {
        selectedTask = t.task_id;
        document.querySelectorAll("#tasks button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
      };
      list.appendChild(btn);
    });

    group.appendChild(title);
    group.appendChild(list);
    box.appendChild(group);
  });
}

async function saveLog(){
  if(!selectedMember){
    showToast("구성원을 선택해 주세요");
    return;
  }
  if(!selectedTask){
    showToast("할일을 선택해 주세요");
    return;
  }

  const res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"addLog",
      member_id:selectedMember,
      task_id:selectedTask
    })
  }).then(r=>r.json());

  if(res.ok){
    showToast("기록했어요!");
    await loadTodayLogs();

    if(document.getElementById("walletScreen").classList.contains("active")){
      loadWalletSummary();
      loadWalletHistory();
    }
  }else{
    showToast("기록 실패");
  }
}

function renderMemberFilters(targetId, clickHandler){
  const box = document.getElementById(targetId);
  box.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "전체";
  allBtn.className = "active";
  allBtn.onclick = () => clickHandler("ALL");
  box.appendChild(allBtn);

  members.forEach(m=>{
    const btn = document.createElement("button");
    btn.textContent = m.name;
    btn.onclick = () => clickHandler(m.member_id);
    box.appendChild(btn);
  });
}

function setFilterActive(targetId, selectedId){
  document.querySelectorAll(`#${targetId} button`).forEach((btn, index)=>{
    btn.classList.remove("active");

    if(selectedId === "ALL" && index === 0) btn.classList.add("active");
    if(members[index - 1] && members[index - 1].member_id === selectedId) btn.classList.add("active");
  });
}

function setTodayLogFilter(memberId){
  todayLogFilter = memberId;
  setFilterActive("todayLogFilters", memberId);
  renderTodayLogs();
}

function setWalletHistoryFilter(memberId){
  walletHistoryFilter = memberId;
  setFilterActive("walletHistoryFilters", memberId);
  renderWalletHistory();
}

async function loadTodayLogs(){
  todayLogs = await fetch(API_URL + "?action=getTodayLogs").then(r=>r.json());
  renderTodayLogs();
}

function renderTodayLogs(){
  const box = document.getElementById("todayLogs");

  const filtered = todayLogFilter === "ALL"
    ? todayLogs
    : todayLogs.filter(log => getMemberIdByName(log.member_name) === todayLogFilter);

  if(!filtered.length){
    box.innerHTML = "아직 기록이 없어요.";
    return;
  }

  box.innerHTML = "";

  filtered.forEach(log=>{
    const time = new Date(log.created_at).toLocaleTimeString("ko-KR", {
      hour:"2-digit",
      minute:"2-digit"
    });

    const row = document.createElement("div");
    row.className = "stat-row";
    row.innerHTML = `<span>${time}</span><strong>${log.member_name} · ${log.task_name}</strong>`;
    box.appendChild(row);
  });
}

function getMemberIdByName(name){
  const member = members.find(m => m.name === name);
  return member ? member.member_id : null;
}

function renderSpendMembers(){
  const select = document.getElementById("spendMember");
  select.innerHTML = "";

  members.forEach(m=>{
    const option = document.createElement("option");
    option.value = m.member_id;
    option.textContent = m.name;
    select.appendChild(option);
  });
}

async function loadWalletSummary(){
  walletSummary = await fetch(API_URL + "?action=getWalletSummary").then(r=>r.json());
  const box = document.getElementById("walletSummary");

  const total = walletSummary.reduce((sum, item)=>sum + Number(item.balance || 0), 0);
  document.getElementById("familyRewardTotal").innerHTML =
    `우리 가족이 <strong>${total.toLocaleString()}원</strong>을 모았어요!`;

  box.innerHTML = "";

  walletSummary.forEach(item=>{
    const row = document.createElement("div");
    row.className = "reward-summary-row";
    row.innerHTML = `
      <span><strong>${item.name}</strong></span>
      <strong>${Number(item.balance).toLocaleString()}원</strong>
      <small>
        <span class="earn-text">적립 ${Number(item.earned).toLocaleString()}원</span>
        ·
        <span class="spend-text">사용 ${Number(item.spent).toLocaleString()}원</span>
      </small>
    `;
    box.appendChild(row);
  });
}

async function loadWalletHistory(){
  walletHistory = await fetch(API_URL + "?action=getWalletHistory").then(r=>r.json());
  renderWalletHistory();
}

function renderWalletHistory(){
  const box = document.getElementById("walletHistory");

  const filtered = walletHistoryFilter === "ALL"
    ? walletHistory
    : walletHistory.filter(tx => tx.member_id === walletHistoryFilter);

  if(!filtered.length){
    box.innerHTML = "아직 월렛 기록이 없어요.";
    return;
  }

  box.innerHTML = "";

  filtered.slice(0, 30).forEach(tx=>{
    const amount = Number(tx.amount || 0);
    const sign = amount > 0 ? "+" : "";
    const typeLabel = amount > 0 ? "적립" : "사용";
    const amountClass = amount > 0 ? "earn-text" : "spend-text";

    const row = document.createElement("div");
    row.className = "wallet-row";
    row.innerHTML = `
      <span class="badge">${typeLabel}</span>
      <strong>${tx.member_name}</strong>
      <span class="desc">${tx.description || "-"}</span>
      <span class="amount ${amountClass}">${sign}${amount.toLocaleString()}원</span>
    `;
    box.appendChild(row);
  });
}

async function spendWallet(){
  const memberId = document.getElementById("spendMember").value;
  const amount = Number(document.getElementById("spendAmount").value);
  const description = document.getElementById("spendDesc").value;

  if(!amount || amount <= 0){
    showToast("사용 금액을 입력해 주세요");
    return;
  }

  if(!walletSummary.length){
    walletSummary = await fetch(API_URL + "?action=getWalletSummary").then(r=>r.json());
  }

  const owner = walletSummary.find(item => item.member_id === memberId);
  const balance = owner ? Number(owner.balance || 0) : 0;

  if(amount > balance){
    showToast("잔액보다 많이 사용할 수 없어요");
    return;
  }

  const res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"addWalletSpend",
      member_id:memberId,
      amount,
      description
    })
  }).then(r=>r.json());

  if(res.ok){
    showToast("사용 기록을 저장했어요");
    document.getElementById("spendAmount").value = "";
    document.getElementById("spendDesc").value = "";
    loadWalletSummary();
    loadWalletHistory();
  }else{
    showToast("사용 기록 실패");
  }
}

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(()=>toast.style.display="none",1600);
}

init();
</script>
</body>
</html>
